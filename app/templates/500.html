{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div style="text-align: center; padding: 10rem 2rem; background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color);">
    <h1 style="font-size: 6rem; font-weight: 900; margin-bottom: 1rem; color: var(--danger-color);">500</h1>
    <h2 style="font-size: 2rem; margin-bottom: 2rem;">Internal Server Error</h2>
    <p style="color: var(--text-secondary); max-width: 500px; margin: 0 auto 3rem;">Something went wrong on our end. Our engineering team has been notified. Please try again later.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary" style="padding: 1rem 2rem; border-radius: 12px; font-size: 1.125rem;">Back to Home</a>
</div>
{% endblock %}
