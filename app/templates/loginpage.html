{% extends "base.html" %}

{% block title %}Login - PDF OCR & Translation{% endblock %}

{% block content %}
<div class="login-card card" style="padding: 3rem; border-radius: 20px;">
    <h1 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Admin Login</h1>
    <form action="{{ url_for('main.login_page') }}" method="post">
        <div class="form-group">
            <label for="username" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Username</label>
            <input type="text" name="username" id="username" required class="form-input" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Password</label>
            <input type="password" name="password" id="password" required class="form-input" placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: 12px; font-size: 1.125rem; font-weight: 600;">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
